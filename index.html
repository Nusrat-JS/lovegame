<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Brownie ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Floating Hearts -->
    <div id="floatingHearts"></div>

    <!-- ========================= -->
    <!-- Loading Screen -->
    <!-- ========================= -->

    <section id="loadingScreen">

        <div class="loaderHeart">❤️</div>

        <h1>Loading Something Special...</h1>

        <p>Made only for Brownie 🌸</p>

    </section>

    <!-- ========================= -->
    <!-- Welcome Screen -->
    <!-- ========================= -->

    <section id="welcomeScreen" class="hidden">

        <h1>Hello... 🌸</h1>

        <h2>Who is visiting today?</h2>

        <button id="brownieBtn">
            ❤️ I'm Brownie
        </button>

        <button id="otherBtn">
            🤨 Someone Else
        </button>

        <p id="warningText"></p>

    </section>

    <!-- ========================= -->
    <!-- Story -->
    <!-- ========================= -->

    <section id="storyScreen" class="hidden">

        <h1>Before We Begin...</h1>

        <div id="storyText"></div>

        <button id="storyNext">
            Continue ❤️
        </button>

    </section>

    <!-- ========================= -->
    <!-- Heart Game -->
    <!-- ========================= -->

    <section id="gameScreen" class="hidden">

        <h2>Catch 10 Hearts ❤️</h2>

        <p>Collect all the hearts to unlock your surprise.</p>

        <h1 id="score">0 / 10</h1>

        <div id="gameArea">

            <div id="player">
                ❤️
            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Gallery -->
    <!-- ========================= -->

    <section id="galleryScreen" class="hidden">

        <h1>Here's Some Of My Queen's Photos 📸</h1>

        <div class="gallery">

            <img src="assets/brownie1.jpg" alt="Brownie">

            <img src="assets/brownie2.jpg" alt="Brownie">

            <img src="assets/brownie3.jpg" alt="Brownie">

            <img src="assets/brownie4.jpg" alt="Brownie">

        </div>

        <button id="galleryNext">
            Continue ❤️
        </button>

    </section>

    <!-- ========================= -->
    <!-- Love Letter -->
    <!-- ========================= -->

    <section id="letterScreen" class="hidden">

        <h1>To My Brownie 💌</h1>

        <div id="letterText"></div>

        <button id="letterNext">
            One Last Surprise ✨
        </button>

    </section>

    <!-- ========================= -->
    <!-- Ending -->
    <!-- ========================= -->

    <section id="endingScreen" class="hidden">

        <h1>Happy Birthday Brownie ❤️</h1>

        <div id="bigHeart">
            ❤️
        </div>

        <img
            id="memoryPhoto"
            src="assets/brownie1.jpg"
            alt="Brownie"
        >

        <p id="loveMessage"></p>

        <button id="restartBtn">
            Read Again ❤️
        </button>

    </section>

    <!-- ========================= -->
    <!-- Background Music -->
    <!-- ========================= -->

    <audio id="bgMusic" loop>

        <source src="assets/birthday.mp3" type="audio/mpeg">

        Your browser does not support audio.

    </audio>

    <script src="script.js"></script>

</body>

</html>
